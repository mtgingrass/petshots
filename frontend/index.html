<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Petshots</title>
    <meta name="description" content="Your pet's vaccine records, ready in 10 seconds at the door." />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at 50% 30%, #1e3a5f, #0b1622);
        color: #f5f7fa;
        text-align: center;
        padding: 1.5rem;
      }
      .card { max-width: 30rem; }
      h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin: 0 0 0.5rem; letter-spacing: -0.02em; }
      .tag { font-size: 1.15rem; opacity: 0.85; line-height: 1.5; margin: 0 0 2rem; }
      .badge {
        display: inline-block;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        opacity: 0.55;
        border: 1px solid currentColor;
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>🐾 Petshots</h1>
      <p class="tag">Your pet's vaccine records, ready in 10 seconds &mdash; at the dog bar, the groomer, the boarder.</p>
      <span class="badge">Coming soon</span>
    </main>
  </body>
</html>
